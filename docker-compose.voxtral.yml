services:
  vllm-server:
    image: duel-server/vllm-voxtral:local
    build:
      context: .
      dockerfile: Dockerfile.voxtral
      args:
        VLLM_BASE_IMAGE: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
    container_name: vllm-server
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "${VLLM_PORT:-8000}:8000"
    environment:
      - VLLM_DISABLE_COMPILE_CACHE=1
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    command:
      - mistralai/Voxtral-Mini-4B-Realtime-2602
      - --compilation_config
      - '{"cudagraph_mode": "PIECEWISE"}'
      - --gpu-memory-utilization
      - "0.92"
      - --max-model-len
      - "8192"
      - --max-num-seqs
      - "1"
      - --max-num-batched-tokens
      - "512"
      - --enforce-eager
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 10m

volumes:
  huggingface_cache:
    driver: local

